version: '3.7'

services:
  pgturbohybrid:
    container_name: pgturbohybrid
    image: ghcr.io/mayflower/pgturbohybrid:${PGTURBOHYBRID_TAG:-0.1.0-pg17}
    environment:
      - POSTGRES_DB=pgturbohybrid
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    # shared_buffers should be 25% of memory
    # maintenance_work_mem should be ~65%
    command: postgres -c shared_buffers=6GB -c maintenance_work_mem=16GB -c max_connections=200
    # shm_size should be shared_buffers + maintenance_work_mem
    shm_size: 22g
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pgturbohybrid"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-file: 1
        max-size: 10m
    deploy:
      resources:
        limits:
          memory: 25Gb
